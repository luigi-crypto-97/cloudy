<svg xmlns="http://www.w3.org/2000/svg" width="320" height="650" viewBox="0 0 320 650">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5CB5C"/>
      <stop offset="50%" style="stop-color:#F09433"/>
      <stop offset="100%" style="stop-color:#DC2743"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Screen background -->
  <rect width="320" height="650" fill="url(#screenGrad)"/>

  <!-- Status bar -->
  <rect width="320" height="44" fill="#000" opacity="0.5"/>
  <text x="160" y="28" font-family="-apple-system, sans-serif" font-size="14" fill="#fff" text-anchor="middle">9:41</text>

  <!-- App header -->
  <rect x="0" y="44" width="320" height="60" fill="#0a0a0a"/>
  <text x="160" y="82" font-family="-apple-system, sans-serif" font-size="24" font-weight="700" fill="url(#heroGrad)" text-anchor="middle">FriendMap</text>

  <!-- Map placeholder -->
  <rect x="20" y="120" width="280" height="300" rx="16" fill="#1a1a1a"/>
  <circle cx="160" cy="270" r="60" fill="url(#heroGrad)" opacity="0.2"/>
  <circle cx="160" cy="270" r="40" fill="url(#heroGrad)" opacity="0.3"/>
  <circle cx="160" cy="270" r="20" fill="url(#heroGrad)"/>

  <!-- Map pins -->
  <circle cx="100" cy="200" r="8" fill="#F5CB5C" opacity="0.6"/>
  <circle cx="220" cy="240" r="8" fill="#F09433" opacity="0.6"/>
  <circle cx="140" cy="320" r="8" fill="#DC2743" opacity="0.6"/>

  <!-- Bottom sheet -->
  <rect x="0" y="440" width="320" height="210" fill="#111" rx="24"/>
  <rect x="120" y="455" width="80" height="4" rx="2" fill="#333"/>

  <!-- Friend avatars -->
  <circle cx="60" cy="500" r="20" fill="#F5CB5C"/>
  <circle cx="120" cy="500" r="20" fill="#F09433"/>
  <circle cx="180" cy="500" r="20" fill="#DC2743"/>
  <circle cx="240" cy="500" r="20" fill="#333"/>
  <text x="240" y="505" font-family="-apple-system, sans-serif" font-size="20" fill="#fff" text-anchor="middle">+</text>

  <!-- CTA Button -->
  <rect x="40" y="560" width="240" height="50" rx="25" fill="url(#heroGrad)"/>
  <text x="160" y="592" font-family="-apple-system, sans-serif" font-size="16" font-weight="600" fill="#000" text-anchor="middle">Vedi chi è vicino</text>
</svg>
