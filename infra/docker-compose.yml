services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: friendmap-postgres
    environment:
      POSTGRES_DB: friendmap
      POSTGRES_USER: friendmap
      POSTGRES_PASSWORD: friendmap_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: friendmap-redis
    ports:
      - "6379:6379"

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: friendmap-api
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: ["dotnet", "run", "--project", "src/FriendMap.Api/FriendMap.Api.csproj", "--urls", "http://0.0.0.0:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=friendmap;Username=friendmap;Password=friendmap_dev
      ConnectionStrings__Redis: redis:6379
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  admin:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: friendmap-admin
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: ["dotnet", "run", "--project", "src/FriendMap.Admin/FriendMap.Admin.csproj", "--urls", "http://0.0.0.0:8090"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Api__BaseUrl: http://api:8080/
      Admin__Username: admin
      Admin__Password: admin_dev
    depends_on:
      - api
    ports:
      - "8090:8090"

volumes:
  postgres_data:
