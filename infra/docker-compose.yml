services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: friendmap-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-friendmap}
      POSTGRES_USER: ${POSTGRES_USER:-friendmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-friendmap_dev}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: friendmap-redis
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"

  api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: friendmap-api
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: ["dotnet", "run", "--project", "src/FriendMap.Api/FriendMap.Api.csproj", "--urls", "http://0.0.0.0:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=${POSTGRES_DB:-friendmap};Username=${POSTGRES_USER:-friendmap};Password=${POSTGRES_PASSWORD:-friendmap_dev}
      ConnectionStrings__Redis: redis:6379
      MediaStorage__Provider: ${MediaStorage__Provider:-local}
      MediaStorage__Bucket: ${MediaStorage__Bucket:-}
      MediaStorage__Endpoint: ${MediaStorage__Endpoint:-}
      MediaStorage__Region: ${MediaStorage__Region:-}
      MediaStorage__AccessKeyId: ${MediaStorage__AccessKeyId:-}
      MediaStorage__SecretAccessKey: ${MediaStorage__SecretAccessKey:-}
      MediaStorage__PublicBaseUrl: ${MediaStorage__PublicBaseUrl:-}
      MediaStorage__ForcePathStyle: ${MediaStorage__ForcePathStyle:-true}
      MediaStorage__UsePrivateBucket: ${MediaStorage__UsePrivateBucket:-true}
      MediaStorage__SignedUrlMinutes: ${MediaStorage__SignedUrlMinutes:-15}
      AppleAuth__Audience: ${AppleAuth__Audience:-it.luiginegri.FriendMapSeed}
      Admin__ApiKey: ${Admin__ApiKey:-}
      Cloudy__DemoSignals: ${Cloudy__DemoSignals:-false}
      Cloudy__TestUsersEnabled: ${Cloudy__TestUsersEnabled:-false}
    depends_on:
      - postgres
      - redis
    ports:
      - "${API_BIND:-127.0.0.1}:8080:8080"

  admin:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: friendmap-admin
    working_dir: /workspace
    volumes:
      - ..:/workspace
    command: ["dotnet", "run", "--project", "src/FriendMap.Admin/FriendMap.Admin.csproj", "--urls", "http://0.0.0.0:8090"]
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      Api__BaseUrl: http://api:8080/
      Api__AdminApiKey: ${Api__AdminApiKey:-}
      Admin__Username: ${Admin__Username:-admin}
      Admin__Password: ${Admin__Password:-admin_dev}
    depends_on:
      - api
    ports:
      - "${ADMIN_BIND:-127.0.0.1}:8090:8090"

volumes:
  postgres_data:
